name: Build and Release Zeus Lockdown Plugin

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - '.github/workflows/**' # Ignores any changes to workflow files
      - 'README.md'            # Optional: Good idea to ignore readme edits too
  workflow_dispatch:

# Grants the GITHUB_TOKEN permission to push commits and create releases
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetches all history so we can push back

    - name: Bump Version in CS File
      id: bump
      run: |
        # Find the plugin file
        FILE=$(find . -name "ZeusLockdown*.cs" | head -n 1)
        
        # Extract the current version (e.g., "1.0" or "3.4")
        CURRENT_VERSION=$(grep -oP 'ModuleVersion\s*=>\s*"\K[0-9.]+' "$FILE")
        echo "Current Version: $CURRENT_VERSION"
        
        # Split into an array by the decimal point
        IFS='.' read -r -a parts <<< "$CURRENT_VERSION"
        
        # Increment logic (Handles 1.0 -> 1.0.1, or 1.0.1 -> 1.0.2)
        if [ ${#parts[@]} -eq 1 ]; then
            NEW_VERSION="${parts[0]}.0.1"
        elif [ ${#parts[@]} -eq 2 ]; then
            NEW_VERSION="${parts[0]}.${parts[1]}.1"
        else
            parts[2]=$((parts[2] + 1))
            NEW_VERSION="${parts[0]}.${parts[1]}.${parts[2]}"
        fi
        
        echo "New Version: $NEW_VERSION"
        
        # Replace the old version string with the new one in the file
        sed -i "s/ModuleVersion\s*=>\s*\"$CURRENT_VERSION\"/ModuleVersion => \"$NEW_VERSION\"/" "$FILE"
        
        # Save the new version to the GitHub environment for later steps
        echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

    - name: Commit and Push Version Bump
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add .
        # [skip ci] prevents this commit from triggering the workflow again in an infinite loop
        git commit -m "chore: bump version to ${{ env.NEW_VERSION }} [skip ci]"
        git push

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Fetch Latest CounterStrikeSharp API
      run: |
        LATEST_URL=$(curl -s https://api.github.com/repos/roflmuffin/CounterStrikeSharp/releases/latest | jq -r '.assets[] | select(.name | contains("counterstrikesharp-with-runtime")) | .browser_download_url' | head -n 1)
        echo "Downloading CS# from: $LATEST_URL"
        wget -qO cs_sharp.zip "$LATEST_URL"
        
        unzip -q cs_sharp.zip -d cs_sharp_temp
        mkdir -p lib
        find cs_sharp_temp -name "CounterStrikeSharp.API.dll" -exec cp {} lib/ \;
        rm -rf cs_sharp.zip cs_sharp_temp

    - name: Generate .csproj File
      run: |
        cat <<EOF > ZeusLockdown.csproj
        <Project Sdk="Microsoft.NET.Sdk">
          <PropertyGroup>
            <TargetFramework>net8.0</TargetFramework>
            <ImplicitUsings>enable</ImplicitUsings>
            <Nullable>enable</Nullable>
            <CopyLocalLockFileAssemblies>true</CopyLocalLockFileAssemblies>
          </PropertyGroup>
          <ItemGroup>
            <Reference Include="CounterStrikeSharp.API">
              <HintPath>lib/CounterStrikeSharp.API.dll</HintPath>
              <Private>false</Private>
            </Reference>
          </ItemGroup>
        </Project>
        EOF

    - name: Build Plugin
      run: dotnet publish ZeusLockdown.csproj -c Release -o ./publish

    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Use the GitHub CLI to create a release, tag it, and upload the .dll
        gh release create "v${{ env.NEW_VERSION }}" ./publish/ZeusLockdown.dll \
          --title "Zeus Lockdown v${{ env.NEW_VERSION }}" \
          --notes "Automated release of Zeus Lockdown version ${{ env.NEW_VERSION }}." \
          --latest
